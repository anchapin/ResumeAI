[mypy]
# Strict mode enables all optional errors
strict = True

# Python version
python_version = 3.11

# Output options
warn_unused_configs = True
show_error_codes = True
show_error_context = True
pretty = True

# Per-module options
[mypy-tests.*]
ignore_errors = True

[mypy-conftest]
ignore_errors = True

[mypy-setuptools.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True
