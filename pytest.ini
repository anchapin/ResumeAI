[tool:pytest]
testpaths = tests/api_integration_tests tests/monitoring resume-api/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = resume-api
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    integration: marks tests as integration tests
    api: marks tests as API tests
    auth: marks tests as authentication tests
    rate_limit: marks tests as rate limiting tests

[coverage:run]
source = resume-api
omit = 
    */site-packages/*
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 60

[coverage:html]
directory = coverage_html