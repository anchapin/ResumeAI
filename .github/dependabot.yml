version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    groups:
      production-dependencies:
        patterns:
          - "react*"
          - "*"
      dev-dependencies:
        patterns:
          - "@types/*"
          - "*eslint*"
          - "*test*"
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/resume-api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      production-dependencies:
        patterns:
          - "fastapi"
          - "pydantic"
          - "*"
      dev-dependencies:
        patterns:
          - "*pytest*"
          - "*black*"
          - "*flake8*"
          - "*mypy*"
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
