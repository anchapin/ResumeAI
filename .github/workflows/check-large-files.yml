name: "Check Large Files"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-large-files:
    name: Check for large files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check for files larger than 1MB
        run: |
          # Find files larger than 1MB (1024KB)
          large_files=$(find . -type f -size +1M ! -path './.git/*' 2>/dev/null)
          
          if [ -n "$large_files" ]; then
            echo "❌ Error: The following files exceed 1MB:"
            echo "$large_files"
            echo ""
            echo "Please either:"
            echo "  1. Remove large files"
            echo "  2. Add them to .gitignore"
            echo "  3. Use Git LFS for binary assets"
            exit 1
          fi
          
          echo "✅ No files larger than 1MB found"
