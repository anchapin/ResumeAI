name: Flaky Test Detection

on:
  schedule:
    # Run flaky test detection weekly on Sunday
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of test runs'
        required: false
        default: '3'
        type: string
      threshold:
        description: 'Failure rate threshold (0-1)'
        required: false
        default: '0.3'
        type: string

jobs:
  detect-flaky-tests:
    name: Detect Flaky Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run flaky test detection
        id: detect
        run: |
          RUNS=${{ github.event.inputs.runs || '3' }}
          THRESHOLD=${{ github.event.inputs.threshold || '0.3' }}
          npm run test:flaky:report -- --runs $RUNS --threshold $THRESHOLD --paths ./tests
        continue-on-error: true

      - name: Generate summary report
        if: always()
        run: |
          if [ -f flaky-test-report.json ]; then
            echo "## 🔍 Flaky Test Detection Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Test run configuration:" >> $GITHUB_STEP_SUMMARY
            echo "- Runs: ${{ github.event.inputs.runs || '3' }}" >> $GITHUB_STEP_SUMMARY
            echo "- Threshold: ${{ github.event.inputs.threshold || '0.3' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            FLAKY_COUNT=$(cat flaky-test-report.json | jq -r '.flakyTests | length' 2>/dev/null || echo "0")
            if [ "$FLAKY_COUNT" -gt 0 ]; then
              echo "### ⚠️ Flaky Tests Detected ($FLAKY_COUNT)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              cat flaky-test-report.json | jq -r '.flakyTests[] | "- \(.name): \(.failureRate * 100)% failure rate"' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "These tests have failed intermittently and should be investigated." >> $GITHUB_STEP_SUMMARY
            else
              echo "### ✅ No Flaky Tests Detected" >> $GITHUB_STEP_SUMMARY
              echo "All tests passed consistently across multiple runs." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## ℹ️ Flaky Test Detection" >> $GITHUB_STEP_SUMMARY
            echo "No report generated - all tests may have passed consistently." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload flaky test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-report
          path: flaky-test-report.json
          retention-days: 30
