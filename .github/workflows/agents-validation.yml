name: Validate AGENTS.md

on:
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "package.json"
      - "package-lock.json"

jobs:
  validate-agents-md:
    name: Validate AGENTS.md
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AGENTS.md exists
        id: check_file
        run: |
          if [ ! -f "AGENTS.md" ]; then
            echo "error=AGENTS.md file not found" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "exists=true" >> $GITHUB_OUTPUT

      - name: Check file is not empty
        if: steps.check_file.outputs.exists == 'true'
        run: |
          if [ ! -s "AGENTS.md" ]; then
            echo "error=AGENTS.md is empty" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Validate AGENTS.md minimum length
        if: steps.check_file.outputs.exists == 'true'
        run: |
          MIN_LINES=50
          LINE_COUNT=$(wc -l < AGENTS.md)
          
          if [ "$LINE_COUNT" -lt "$MIN_LINES" ]; then
            echo "error=AGENTS.md is too short ($LINE_COUNT lines). Minimum $MIN_LINES lines required." >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "length=passed" >> $GITHUB_OUTPUT

      - name: Validate AGENTS.md required sections
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for required sections in AGENTS.md
          REQUIRED_SECTIONS=(
            "Build"
            "Test"
            "Code Style"
          )
          MISSING_SECTIONS=""
          
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -iq "$section" AGENTS.md; then
              MISSING_SECTIONS="$MISSING_SECTIONS $section"
            fi
          done
          
          if [ -n "$MISSING_SECTIONS" ]; then
            echo "error=Missing required sections:$MISSING_SECTIONS" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "sections=passed" >> $GITHUB_OUTPUT

      - name: Validate AGENTS.md has code examples
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for code blocks (escape backticks for literal match)
          if ! grep -q '\`\`\`' AGENTS.md; then
            echo "error=AGENTS.md must contain code examples" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "code_examples=passed" >> $GITHUB_OUTPUT

      - name: Validate AGENTS.md has frontend section
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for frontend (React/TypeScript) section
          if ! grep -iq "frontend\|react\|typescript" AGENTS.md; then
            echo "error=AGENTS.md must contain frontend/React/TypeScript section" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "frontend=passed" >> $GITHUB_OUTPUT

      - name: Validate AGENTS.md has backend section
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for backend (Python/FastAPI) section
          if ! grep -iq "backend\|python\|fastapi" AGENTS.md; then
            echo "error=AGENTS.md must contain backend/Python/FastAPI section" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "backend=passed" >> $GITHUB_OUTPUT

      - name: Validate AGENTS.md has testing documentation
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for testing commands section
          if ! grep -iq "test\|vitest\|pytest" AGENTS.md; then
            echo "error=AGENTS.md must contain testing documentation" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "testing=passed" >> $GITHUB_OUTPUT

      - name: Validate AGENTS.md has build/lint commands
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for build/lint commands
          if ! grep -iqE "build|lint|format" AGENTS.md; then
            echo "error=AGENTS.md must contain build/lint/format commands" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "commands=passed" >> $GITHUB_OUTPUT

      - name: Validate npm scripts referenced in AGENTS.md exist
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Extract npm script names from AGENTS.md and verify they exist in package.json
          if [ -f "package.json" ]; then
            # Get all npm scripts from package.json
            SCRIPTS=$(jq -r '.scripts | keys[]' package.json 2>/dev/null || echo "")
            
            # Look for script references in AGENTS.md (e.g., npm run test, npm run build)
            # Extract potential script names from AGENTS.md
            REFERENCES=$(grep -oE 'npm run [a-zA-Z0-9_-]+' AGENTS.md | sed 's/npm run //' | sort -u)
            
            for ref in $REFERENCES; do
              if ! echo "$SCRIPTS" | grep -q "^${ref}$"; then
                echo "Warning: AGENTS.md references npm script '$ref' but it doesn't exist in package.json"
              fi
            done
            echo "npm_scripts=validated"
          else
            echo "package.json not found, skipping npm script validation"
          fi

      - name: Validate Python scripts/commands are valid
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Check for common Python commands referenced in AGENTS.md
          # Look for pytest, black, flake8, mypy references
          
          if grep -qE "pytest" AGENTS.md; then
            # Check if pytest is available (installed or in requirements)
            if [ -f "resume-api/requirements.txt" ]; then
              if ! grep -qi "pytest" resume-api/requirements.txt; then
                echo "Warning: AGENTS.md mentions pytest but it's not in requirements.txt"
              fi
            fi
          fi
          
          echo "python_commands=validated"

      - name: Validate file paths referenced in AGENTS.md exist
        if: steps.check_file.outputs.exists == 'true'
        run: |
          # Extract potential file paths from AGENTS.md and verify they exist
          # This catches paths like src/, resume-api/, .github/workflows/
          
          # Common paths that should exist
          EXPECTED_PATHS=(
            "src"
            "resume-api"
            ".github/workflows"
          )
          
          for path in "${EXPECTED_PATHS[@]}"; do
            if grep -qE "(^|[^a-zA-Z])$path(/|$)" AGENTS.md; then
              if [ ! -d "$path" ]; then
                echo "Warning: AGENTS.md references '$path/' but directory doesn't exist"
              fi
            fi
          done
          echo "file_paths=validated"

      - name: Report validation success
        if: success()
        run: echo "AGENTS.md validation passed - all quality checks successful"
