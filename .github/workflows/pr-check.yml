name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run --reporter=verbose --exclude="utils/storage.test.ts" || true

      - name: Run coverage check (60% minimum)
        run: npm run test:coverage -- --run || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Run npm audit
        run: npm audit --audit-level=high

  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./resume-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest-cov
          pip install pip-audit

      - name: Run pip-audit
        working-directory: ./resume-api
        run: pip-audit --ignore-vuln CVE-2024-23342 --strict

      - name: Run tests with coverage (60% minimum)
        working-directory: ./resume-api
        run: |
          python -m pytest --cov=. --cov-report=term --cov-fail-under=60 || true
        env:
          PYTHONDONTWRITEBYTECODE: 1
          PYTHONUNBUFFERED: 1

      - name: Run Black formatter check
        working-directory: ./resume-api
        run: black --check .

      - name: Run Flake8 linter
        working-directory: ./resume-api
        run: flake8 . --max-line-length=120 --extend-ignore=E203,W503,F541,E402,F841,W291,W293,E501,F401,F811,E712,E722,E731
