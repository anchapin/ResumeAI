name: Deployment

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub packages
permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs between the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test job
  build:
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate deployment ID
        id: deploy
        run: |
          DEPLOYMENT_ID="deploy-$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Generated deployment ID: $DEPLOYMENT_ID"

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="main-$(date +%Y%m%d)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./resume-api
          push: false
          tags: resume-api:${{ steps.version.outputs.version }}
          load: true

      - name: Run tests
        run: |
          docker run --rm -e JWT_SECRET=test-secret-for-ci-testing-32chars resume-api:${{ steps.version.outputs.version }} python -m pytest tests/ -v --tb=short || true

  # Deployment job
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Environment: $ENV"

      - name: Report deployment start
        run: |
          DEPLOYMENT_ID="deploy-$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"
          echo "Deployment start reported with ID: $DEPLOYMENT_ID"
          
          # Call deployment tracking API if available
          curl -X POST "http://localhost:8000/api/v1/deployment/events/start?deployment_id=$DEPLOYMENT_ID&version=${{ needs.build.outputs.version }}&deployment_type=rolling&environment=${{ steps.env.outputs.environment }}" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.API_KEY }}" \
            || echo "Deployment tracking API not available, continuing..."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            anchapin/resume-api
            ghcr.io/${{ github.repository }}/resume-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{version}},enable={{is_tag}}
            type=raw,value={{major}}.{{minor}},enable={{is_tag}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./resume-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to environment
        run: |
          echo "Deploying to ${{ steps.env.outputs.environment }}..."
          # Add your deployment commands here
          # Examples:
          # - kubectl apply -f k8s/
          # - docker-compose -f docker-compose.prod.yml up -d
          # - helm upgrade resumeai ./chart

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

      - name: Verify deployment
        run: |
          echo "Verifying deployment health..."
          # Add health check commands
          # Example: curl -f https://your-api.example.com/api/v1/health || exit 1
          # Placeholder: add real health check endpoint for production
          echo "Health check completed"

      - name: Health check with retries
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          retry_wait_seconds: 10
          max_attempts: 3
          command: |
            echo "Performing health check..."
            # Replace with actual health check endpoint
            # curl -f https://your-api.example.com/api/v1/health || exit 1
            echo "Health check passed"

      - name: Report deployment status
        if: always()
        run: |
          DEPLOYMENT_ID="deploy-$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"
          STATUS="${{ job.status }}"
          
          if [ "$STATUS" == "success" ]; then
            STATUS_VALUE="success"
          else
            STATUS_VALUE="failed"
          fi
          
          echo "Reporting deployment status: $STATUS_VALUE"
          
          # Call deployment tracking API if available
          curl -X POST "http://localhost:8000/api/v1/deployment/events/complete?deployment_id=$DEPLOYMENT_ID&status=$STATUS_VALUE" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.API_KEY }}" \
            || echo "Deployment tracking API not available, continuing..."

      - name: Notify monitoring system
        if: always()
        run: |
          DEPLOYMENT_ID="deploy-$(date +%Y%m%d-%H%M%S)-${{ github.sha }}"
          STATUS="${{ job.status }}"
          
          # Send metrics to monitoring system (Datadog, Prometheus, etc.)
          if [ -n "${{ secrets.MONITORING_API_KEY }}" ]; then
            curl -X POST "https://api.monitoring.example.com/v1/metrics" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.MONITORING_API_KEY }}" \
              -d "{\"metric\":\"deployment.status\",\"value\":$([ \"$STATUS\" = \"success\" ] && echo \"1\" || echo \"0\"),\"tags\":[\"environment:${{ steps.env.outputs.environment }}\",\"service:resume-api\"]}" \
              || echo "Monitoring API not available"
          fi

  # Notify observability systems
  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create deployment summary
        id: summary
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          
          if [ "$BUILD_STATUS" == "success" ] && [ "$DEPLOY_STATUS" == "success" ]; then
            SUMMARY="Deployment completed successfully"
            COLOR="green"
          else
            SUMMARY="Deployment failed"
            COLOR="red"
          fi
          
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Create GitHub Deployment
        uses: actions/create-deployment@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          environment: production
          ref: ${{ github.sha }}
          description: ${{ steps.summary.outputs.summary }}
          auto_merge: false

      - name: Update deployment status
        uses: actions/update-deployment@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          environment: production
          state: ${{ needs.deploy.result == 'success' && 'success' || 'failure' }}
          description: ${{ steps.summary.outputs.summary }}
          environment_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send deployment notification
        if: always()
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          
          # Create detailed summary
          if [ "$BUILD_STATUS" == "success" ] && [ "$DEPLOY_STATUS" == "success" ]; then
            MESSAGE=":white_check_mark: Deployment successful to ${{ steps.env.outputs.environment }}"
          else
            MESSAGE=":x: Deployment failed - Build: $BUILD_STATUS, Deploy: $DEPLOY_STATUS"
          fi
          
          # Send Slack notification if webhook is configured
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST -H 'Content-Type: application/json' \
              --data "{\"text\":\"$MESSAGE\\nEnvironment: ${{ steps.env.outputs.environment }}\\nCommit: ${{ github.sha }}\\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" \
              || echo "Slack notification failed"
          fi
          
          # Send Discord notification if webhook is configured  
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -s -X POST -H 'Content-Type: application/json' \
              --data "{\"content\":\"$MESSAGE\\nEnvironment: ${{ steps.env.outputs.environment }}\\nCommit: ${{ github.sha }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              || echo "Discord notification failed"
          fi
