name: Duplicate Code Detection

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'resume-api/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'resume-api/**'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Maximum allowed duplicate percentage'
        required: false
        default: '5'
        type: string

jobs:
  duplicate-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run duplicate code detection
        id: jscpd
        continue-on-error: true
        run: |
          THRESHOLD=${{ github.event.inputs.threshold || '5' }}
          npx jscpd --threshold $THRESHOLD src/ resume-api/ --format "typescript,python" --ignore "**/node_modules/**" || true

      - name: Parse and report results
        run: |
          # Check for duplicate report
          if [ -f "jscpd-report.json" ]; then
            DUPLICATES=$(jq '.statistics.total.duplicates // 0' jscpd-report.json 2>/dev/null || echo "0")
            LINES=$(jq '.statistics.total.duplicateLines // 0' jscpd-report.json 2>/dev/null || echo "0")
            
            echo "## 🔍 Duplicate Code Detection" >> $GITHUB_STEP_SUMMARY
            echo "Duplicates found: $DUPLICATES" >> $GITHUB_STEP_SUMMARY
            echo "Lines affected: $LINES" >> $GITHUB_STEP_SUMMARY
            
            if [ "$DUPLICATES" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Files with duplicates:" >> $GITHUB_STEP_SUMMARY
              jq -r '.duplicates[]? | "- \(.firstFile):\(.firstLine) -> \(.secondFile):\(.secondLine)"' jscpd-report.json 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## 🔍 Duplicate Code Detection" >> $GITHUB_STEP_SUMMARY
            echo "No duplicates detected or report not generated." >> $GITHUB_STEP_SUMMARY
          fi
