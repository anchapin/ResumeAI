name: Security Scanning (SAST/DAST)

on:
  push:
    branches: [main, develop]
    paths:
      - 'resume-api/**'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'resume-api/**'
      - '.github/workflows/security-scan.yml'
  schedule:
    - cron: '0 2 * * 0'  # Weekly scan on Sunday 2 AM
  workflow_dispatch:

jobs:
  # SAST - Static Application Security Testing (CodeQL)
  sast:
    name: SAST Analysis (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          upload: true

  # Dependency Vulnerability Scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on resume-api
        working-directory: ./resume-api
        run: pip-audit --ignore-vuln CVE-2024-23342 || true

      - name: Check npm dependencies
        if: always()
        run: |
          npm audit --prefix src --audit-level=moderate || true

  # DAST - Dynamic Application Security Testing (OWASP ZAP)
  dast:
    name: DAST API Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs: [dependency-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start API server for testing
        working-directory: ./resume-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn
          # Start server in background
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          sleep 10
          # Verify server is running
          curl -f http://127.0.0.1:8000/api/v1/health || echo "Server health check failed"
        env:
          DEBUG: "true"
          JWT_SECRET: "test-secret-for-ci-testing-32chars"
          REQUIRE_API_KEY: "false"
          ENABLE_RATE_LIMITING: "false"
          OPENAI_API_KEY: "test-key-for-ci"

      - name: Run OWASP ZAP API scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'http://127.0.0.1:8000/api/v1/health'
          allow_issue_writing: false

      - name: Cleanup
        if: always()
        run: |
          pkill -f "uvicorn main:app" || true
