name: Documentation Generation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'components/**'
      - 'pages/**'
      - 'utils/**'
      - 'hooks/**'
      - 'resume-api/**'
      - 'package.json'
      - 'typedoc.json'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate TypeScript documentation
        run: npm run docs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python doc generator
        run: pip install pdoc

      - name: Generate Python API documentation
        run: |
          pdoc resume-api/lib resume-api/api -o docs/python --template-dir .github/workflows/docs-template 2>/dev/null || \
          pdoc resume-api/lib resume-api/api -o docs/python

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
