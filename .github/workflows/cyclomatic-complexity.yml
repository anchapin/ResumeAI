name: Cyclomatic Complexity Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  complexity-check:
    name: Check Cyclomatic Complexity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install flake8

      - name: Check Python complexity
        run: |
          echo "Checking Python cyclomatic complexity..."
          # Check complexity with flake8 (max complexity = 10) - fail on violations
          flake8 resume-api/ --max-complexity=10 --select=C901
          
          # Report complexity metrics
          echo "Complexity check complete. Functions must have complexity <= 10."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --silent

      - name: Check TypeScript complexity
        run: |
          echo "Checking TypeScript cyclomatic complexity..."
          # Run ESLint to enforce complexity rules - will fail on violations
          npm run lint
          echo "TypeScript complexity check complete. All functions must have complexity <= 20."
