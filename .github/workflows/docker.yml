name: Docker

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
    paths:
      - 'resume-api/**'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'resume-api/**'
      - '.github/workflows/docker.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: resume-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./resume-api
          push: false
          tags: resume-api:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image runs
        run: |
          docker run --rm -e JWT_SECRET=test-secret-for-ci-testing-32chars resume-api:latest python -c "import main; print('Resume API loads successfully')"

      - name: Test Docker health check
        run: |
          # Start container in background
          docker run -d --name test-resume-api -p 8000:8000 -e JWT_SECRET=test-secret-for-ci-testing-32chars resume-api:latest
          # Wait for container to start
          sleep 5
          # Check health endpoint
          docker exec test-resume-api curl -f http://localhost:8000/health || true
          # Cleanup
          docker stop test-resume-api || true

  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    needs: build

    defaults:
      run:
        working-directory: resume-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            anchapin/resume-api
            ghcr.io/${{ github.repository }}/resume-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{version}},enable={{is_tag}}
            type=raw,value={{major}}.{{minor}},enable={{is_tag}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./resume-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push

    steps:
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Resume API ${{ github.ref_name }}
          draft: false
          prerelease: false
