# Development environment values for resume-api
replicaCount: 1

image:
  pullPolicy: IfNotPresent
  tag: "dev"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: dev.api.resumeai.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: resumeapi-tls-dev
      hosts:
        - dev.api.resumeai.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false

env:
  DEBUG: "true"
  AI_PROVIDER: "openai"
  AI_MODEL: "gpt-3.5-turbo"
  REQUIRE_API_KEY: "false"

database:
  host: "postgres-dev.default.svc.cluster.local"

redis:
  host: "redis-dev.default.svc.cluster.local"
