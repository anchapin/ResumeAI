# Staging environment values for resume-api
replicaCount: 2

image:
  pullPolicy: Always
  tag: "staging"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: staging.api.resumeai.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: resumeapi-tls-staging
      hosts:
        - staging.api.resumeai.com

resources:
  limits:
    cpu: 1500m
    memory: 1.5Gi
  requests:
    cpu: 300m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75

env:
  DEBUG: "false"
  AI_PROVIDER: "openai"
  AI_MODEL: "gpt-4o-mini"
  REQUIRE_API_KEY: "true"

database:
  host: "postgres-staging.default.svc.cluster.local"

redis:
  host: "redis-staging.default.svc.cluster.local"
