---
# Horizontal Pod Autoscaler for Canary Deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resume-api-canary-hpa
  namespace: production
  labels:
    app: resume-api
    version: canary
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resume-api-canary
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
# PodDisruptionBudget for canary to ensure availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: resume-api-canary-pdb
  namespace: production
  labels:
    app: resume-api
    version: canary
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: resume-api
      version: canary
---
# ResourceQuota for canary namespace to limit resource usage
apiVersion: v1
kind: ResourceQuota
metadata:
  name: resume-api-canary-quota
  namespace: production
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "5"
    services: "3"
    configmaps: "5"
    persistentvolumeclaims: "2"
---
# LimitRange for canary pods to enforce resource constraints
apiVersion: v1
kind: LimitRange
metadata:
  name: resume-api-canary-limits
  namespace: production
spec:
  limits:
    - type: Container
      default:
        memory: 512Mi
        cpu: "500m"
      defaultRequest:
        memory: 256Mi
        cpu: 250m
      max:
        memory: 2Gi
        cpu: "2"
      min:
        memory: 128Mi
        cpu: 100m
