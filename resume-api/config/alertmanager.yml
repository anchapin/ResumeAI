# AlertManager Configuration for Resume API
# Configures alert routing and notification channels

global:
  resolve_timeout: 5m
  # Global SMTP settings
  smtp_smarthost: '{{ SMTP_HOST | default("localhost:25") }}'
  smtp_auth_username: '{{ SMTP_USER | default("") }}'
  smtp_auth_password: '{{ SMTP_PASS | default("") }}'
  smtp_from: '{{ SMTP_FROM | default("alertmanager@resumeai.com") }}'
  slack_api_url: '{{ SLACK_WEBHOOK | default("") }}'

# Default notification settings
route:
  # Group alerts by cluster, alertname, and service
  group_by: ['cluster', 'alertname', 'service']
  # Wait 30s for additional alerts before sending
  group_wait: 30s
  # Wait 5m before sending repeated alerts
  group_interval: 5m
  # Wait 4h before repeating notifications for the same alert
  repeat_interval: 4h
  # Default receiver
  receiver: 'default'
  
  # Route different alert types to appropriate receivers
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 30m
    
    # API performance alerts
    - match:
        service: 'resume-api'
        component: 'http'
      receiver: 'api-team'
      group_wait: 30s
      repeat_interval: 2h
    
    # Database alerts
    - match:
        component: database
      receiver: 'database-team'
      group_wait: 1m
      repeat_interval: 3h
    
    # Business metrics alerts
    - match:
        component: business
      receiver: 'operations-team'
      group_wait: 2m
      repeat_interval: 1h
    
    # OAuth alerts
    - match:
        component: oauth
      receiver: 'auth-team'
      group_wait: 30s
      repeat_interval: 1h
    
    # AI provider alerts
    - match:
        component: ai
      receiver: 'ai-team'
      group_wait: 1m
      repeat_interval: 2h

# Notification receivers configuration
receivers:
  # Default receiver (email or webhook)
  - name: 'default'
    email_configs:
      - to: '{{ DEFAULT_EMAIL | default("devops@resumeai.com") }}'
        headers:
          Subject: '[Resume API] Alert: {{ .GroupLabels.alertname }}'
        smarthost: '{{ SMTP_HOST | default("localhost:25") }}'
    slack_configs:
      - channel: '#alerts-general'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
  
  # Critical alerts - page on-call engineer
  - name: 'critical'
    email_configs:
      - to: '{{ CRITICAL_EMAIL | default("oncall@resumeai.com") }}'
        headers:
          Subject: '[CRITICAL] Resume API Alert: {{ .GroupLabels.alertname }}'
        smarthost: '{{ SMTP_HOST | default("localhost:25") }}'
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    pagerduty_configs:
      - service_key: '{{ PAGERDUTY_KEY | default("") }}'
        description: '{{ .GroupLabels.alertname }}'
  
  # API team
  - name: 'api-team'
    slack_configs:
      - channel: '#team-api'
        title: '[API] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
  
  # Database team
  - name: 'database-team'
    slack_configs:
      - channel: '#team-database'
        title: '[Database] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
  
  # Operations team
  - name: 'operations-team'
    slack_configs:
      - channel: '#team-operations'
        title: '[Operations] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
  
  # Auth/OAuth team
  - name: 'auth-team'
    slack_configs:
      - channel: '#team-auth'
        title: '[Auth] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
  
  # AI team
  - name: 'ai-team'
    slack_configs:
      - channel: '#team-ai'
        title: '[AI] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# Inhibition rules to suppress alerts under certain conditions
inhibit_rules:
  # Don't alert on high response time if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'HighResponseTime'
    equal: ['job', 'instance']
  
  # Don't alert on errors if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'HighErrorRate'
    equal: ['job', 'instance']
  
  # Don't alert on warnings if critical alert is active
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

# Mute times (suppress alerts during maintenance windows)
mute_time_intervals:
  - name: 'maintenance-window'
    time_intervals:
      - times:
          - start_time: '02:00'
            end_time: '03:00'
        weekdays: ['sunday']

