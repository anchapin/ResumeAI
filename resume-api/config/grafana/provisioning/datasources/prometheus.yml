# Grafana datasource configuration for Prometheus
apiVersion: 1

# List of datasources
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      cacheTimeout: 60
      httpMethod: POST
    version: 1
    uid: prometheus

  - name: AlertManager
    type: alertlist
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: true
    version: 1
    uid: alertmanager
