<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Alert</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: #007bff;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px 20px;
            background: white;
        }
        .job-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .job-card h3 {
            margin: 0 0 8px;
            color: #333;
            font-size: 18px;
        }
        .job-card .company {
            color: #666;
            margin-bottom: 10px;
        }
        .job-card .meta {
            color: #999;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .job-card .btn {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }
        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .footer a {
            color: #007bff;
            text-decoration: none;
        }
        .cta-button {
            display: block;
            width: fit-content;
            margin: 30px auto;
            background: #007bff;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔔 New Jobs Matching "{alert_name}"</h1>
        </div>
        
        <div class="content">
            <p>Hi {user_name},</p>
            <p>We found <strong>{job_count}</strong> new job{plural} matching your alert:</p>
            
            <!-- Job Cards -->
            {job_cards}
            
            <a href="{view_all_url}" class="cta-button">View All Jobs</a>
        </div>
        
        <div class="footer">
            <p>You're receiving this because you created a job alert.</p>
            <p>
                <a href="{manage_alerts_url}">Manage Alerts</a> | 
                <a href="{unsubscribe_url}">Unsubscribe</a>
            </p>
            <p>{company_name} © {year}</p>
        </div>
    </div>
</body>
</html>
