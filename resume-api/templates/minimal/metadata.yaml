name: minimal
display_name: Minimal Clean
description: A minimalist resume template focused on content and whitespace. Features clean typography, maximum readability, and no decorative elements. Perfect for designers, developers, and professionals who prefer understated elegance.
format: latex
output_formats:
  - pdf
category: minimal
style: minimalist
author: ResumeAI Team
version: 1.0.0
features:
  - minimalist_design
  - maximum_whitespace
  - clean_typography
  - high_readability
  - understated
recommended_for:
  - designers
  - developers
  - writers
  - academics
  - consultants
  - tech_professionals
font_options:
  - Helvetica
  - Arial
  - Futura
color_schemes:
  - name: pure_minimal
    primary: [17, 17, 17]
    accent: [102, 102, 102]
    secondary: [153, 153, 153]
  - name: soft_gray
    primary: [34, 34, 34]
    accent: [119, 119, 119]
    secondary: [170, 170, 170]
  - name: high_contrast
    primary: [0, 0, 0]
    accent: [51, 51, 51]
    secondary: [128, 128, 128]
